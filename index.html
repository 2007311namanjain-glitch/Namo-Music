<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHONK STUDIO - AI Music Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(180, 0, 0, 0.15) 0%, transparent 50%),
                              radial-gradient(ellipse at 80% 20%, rgba(100, 0, 255, 0.1) 0%, transparent 50%);
        }

        .container {
            text-align: center;
            max-width: 480px;
            width: 90%;
            padding: 30px 20px;
        }

        .logo h1 {
            font-family: 'Orbitron', 'Impact', sans-serif;
            font-size: 2.8rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 50, 50, 0.5);
            letter-spacing: 2px;
        }

        .glow {
            color: #ff3333;
            animation: glow-pulse 2s infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { text-shadow: 0 0 10px #ff3333, 0 0 20px #ff3333; }
            50% { text-shadow: 0 0 20px #ff3333, 0 0 40px #ff3333, 0 0 60px #ff3333; }
        }

        .tagline {
            color: #777;
            font-size: 1.1rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .auth-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px 25px;
            backdrop-filter: blur(10px);
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            gap: 10px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .tab.active {
            background: #ff3333;
            color: #fff;
            border-color: #ff3333;
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.3);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 14px;
        }

        .auth-form.active {
            display: flex;
        }

        .auth-form input {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: border 0.3s;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #ff3333;
        }

        .auth-form input::placeholder {
            color: #555;
        }

        .btn-primary {
            padding: 14px;
            background: linear-gradient(135deg, #ff3333, #cc0000);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.4);
        }

        .features {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #999;
            font-size: 0.95rem;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
        }

        .feature-icon {
            font-size: 1.4rem;
            min-width: 30px;
        }

        .error {
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid #ff3333;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            color: #ff6666;
            font-size: 0.9rem;
        }

        .success-msg {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #33ff33;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            color: #66ff66;
            font-size: 0.9rem;
        }

        footer {
            margin-top: 30px;
            color: #444;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .brand {
            color: #ff3333;
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .logo h1 {
                font-size: 2rem;
            }
            .auth-box {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎵 <span class="glow">PHONK</span> STUDIO</h1>
            <p class="tagline">🔥 AI Music Generator 🔥</p>
        </div>

        <div class="auth-box">
            <!-- ERROR MESSAGE SHOW -->
            <div id="errorBox" class="error" style="display:none;"></div>
            <div id="successBox" class="success-msg" style="display:none;"></div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                <input type="text" id="loginUser" placeholder="Username" required>
                <input type="password" id="loginPass" placeholder="Password" required>
                <button type="submit" class="btn-primary">🔥 Login</button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signup-form" class="auth-form" onsubmit="handleSignup(event)">
                <input type="text" id="signupUser" placeholder="Choose Username" required minlength="3">
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPass" placeholder="Password (min 6 chars)" required minlength="6">
                <button type="submit" class="btn-primary">🚀 Create Account</button>
            </form>

            <div class="features">
                <div class="feature">
                    <span class="feature-icon">🎧</span>
                    <span>Phonk • Trap • Lo-fi • Drift Phonk</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🤖</span>
                    <span>Powered by Udio + Suno AI + MusicGen</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">©️</span>
                    <span>Copyright Reserved — Your Music</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">💾</span>
                    <span>Login Info Safe — Local Storage</span>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 <span class="brand">PHONK STUDIO</span> — All Rights Reserved</p>
            <p style="font-size:0.75rem; margin-top:5px;">Made with 🔥 for khatarnak beats</p>
        </footer>
    </div>

    <script>
        // ===================== TAB SWITCHING =====================
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('successBox').style.display = 'none';

            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            }
        }

        // ===================== USER DATABASE (LocalStorage) =====================
        function getUsers() {
            let users = localStorage.getItem('phonkUsers');
            return users ? JSON.parse(users) : [];
        }

        function saveUsers(users) {
            localStorage.setItem('phonkUsers', JSON.stringify(users));
        }

        function getCurrentUser() {
            return localStorage.getItem('phonkCurrentUser');
        }

        // ===================== SIGNUP =====================
        function handleSignup(e) {
            e.preventDefault();
            const username = document.getElementById('signupUser').value.trim().toLowerCase();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPass').value;
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');

            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            let users = getUsers();

            // Check username
            if (users.find(u => u.username === username)) {
                errorBox.textContent = '❌ Username already exists!';
                errorBox.style.display = 'block';
                return;
            }

            // Check email
            if (users.find(u => u.email === email)) {
                errorBox.textContent = '❌ Email already registered!';
                errorBox.style.display = 'block';
                return;
            }

            // Save user
            users.push({
                username: username,
                email: email,
                password: password, // Note: In real app, hash this
                created: new Date().toISOString(),
                tracks: []
            });
            saveUsers(users);

            successBox.textContent = '✅ Account created! Now login.';
            successBox.style.display = 'block';

            // Clear form
            document.getElementById('signupUser').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPass').value = '';

            // Switch to login tab after 1 sec
            setTimeout(() => switchTab('login'), 1000);
        }

        // ===================== LOGIN =====================
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUser').value.trim().toLowerCase();
            const password = document.getElementById('loginPass').value;
            const errorBox = document.getElementById('errorBox');

            errorBox.style.display = 'none';

            let users = getUsers();
            const user = users.find(u => u.username === username && u.password === password);

            if (!user) {
                errorBox.textContent = '❌ Invalid username or password!';
                errorBox.style.display = 'block';
                return;
            }

            // Set current user
            localStorage.setItem('phonkCurrentUser', JSON.stringify(user));

            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        }

        // ===================== CHECK IF ALREADY LOGGED IN =====================
        // (Will be handled by dashboard page)
    </script>
</body>
</html>
