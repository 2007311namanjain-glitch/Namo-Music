<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAMO MUSIC - Future Sound Node</title>
    <style>
        :root {
            --bg-main: #04010a;
            --accent-purple: #7b1fa2;
            --accent-glow: #e040fb;
            --text-main: #f5f6fa;
            --text-muted: #a29bfe;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, var(--bg-main) 0%, #0d041a 50%, #1a0833 100%);
            color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden;
        }
        .premium-box {
            background: rgba(15, 6, 32, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(224, 64, 251, 0.25);
            border-radius: 24px; padding: 45px; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 0 40px rgba(123, 31, 162, 0.3);
        }
        .hero-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; letter-spacing: 1px; }
        .pulse-watermark { background: linear-gradient(90deg, #e040fb, #00e5ff); -webkit-background-clip: text; -webkit-fill-color: transparent; -webkit-text-fill-color: transparent; }
        .tab-menu { display: flex; justify-content: center; margin: 25px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { background: none; border: none; color: var(--text-muted); padding: 10px 20px; font-size: 1rem; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .tab-btn.active { color: var(--accent-glow); border-bottom: 3px solid var(--accent-glow); }
        input { width: 100%; padding: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(123,31,162,0.3); border-radius: 12px; color: white; margin-bottom: 15px; font-size: 0.95rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent-glow); box-shadow: 0 0 10px rgba(224,64,251,0.3); }
        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(90deg, var(--accent-purple), #9c27b0); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 5px 15px rgba(123,31,162,0.4); transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(224,64,251,0.6); }
    </style>
</head>
<body>
    <div class="premium-box">
        <h1 class="hero-title">Welcome to <span class="pulse-watermark">NAMO MUSIC</span></h1>
        <p style="color: var(--text-muted);">Cybernetic Audio Lab Node</p>
        
        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('login')">LOGIN LINK</button>
            <button class="tab-btn" onclick="switchTab('signup')">CREATE NODE</button>
        </div>

        <form id="loginForm" onsubmit="handleLogin(e)">
            <input type="text" id="loginUser" placeholder="Enter System Username" required>
            <input type="password" id="loginPass" placeholder="Enter Validation Passkey" required>
            <button type="submit" class="btn-submit">INITIALIZE LAYER 🚀</button>
        </form>

        <form id="signupForm" style="display:none;" onsubmit="handleSignup(e)">
            <input type="text" id="signupUser" placeholder="Designate Unique Username" required>
            <input type="email" id="signupEmail" placeholder="Secure Email Matrix" required>
            <input type="password" id="signupPass" placeholder="Generate Security Code" required>
            <button type="submit" class="btn-submit">ACTIVATE DEPLOYMENT 🧬</button>
        </form>
        <div id="successBox" style="display:none; color:#4ade80; margin-top:15px; font-weight:bold;"></div>
    </div>

    <script>
        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = t === 'signup' ? 'block' : 'none';
        }
        function getUsers() { return JSON.parse(localStorage.getItem('phonkUsers')) || []; }
        
        function handleSignup(e) {
            e.preventDefault();
            const u = document.getElementById('signupUser').value.trim();
            let users = getUsers();
            if(users.some(x => x.username.toLowerCase() === u.toLowerCase())) { alert('Username already registered in matrix!'); return; }
            users.push({ username: u, email: document.getElementById('signupEmail').value, password: document.getElementById('signupPass').value, tracks: [] });
            localStorage.setItem('phonkUsers', JSON.stringify(users));
            document.getElementById('successBox').style.display = 'block';
            document.getElementById('successBox').textContent = "Account Node Active! Switching Matrix...";
            setTimeout(() => { switchTab('login'); document.getElementById('successBox').style.display='none'; }, 1200);
        }
        
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value;
            let user = getUsers().find(x => x.username.toLowerCase() === u.toLowerCase() && x.password === p);
            if(!user) { alert('Invalid Configuration Matrix Credentials!'); return; }
            localStorage.setItem('phonkCurrentUser', JSON.stringify(user));
            window.location.href = 'dashboard.html';
        }
        // Patch for direct form inline calls
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
        document.getElementById('signupForm').addEventListener('submit', handleSignup);
    </script>
</body>
</html>
