<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAMO MUSIC - Future Sound Node</title>
    <style>
        :root {
            --bg-main: #070312;
            --accent-purple: #8a2be2;
            --accent-glow: #bf55ec;
            --text-main: #f5f6fa;
            --text-muted: #9a90b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, var(--bg-main) 0%, #11052c 60%, #1d093a 100%);
            color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; overflow-x: hidden;
        }
        body::before {
            content: "NM"; position: fixed; bottom: -30px; right: -10px; font-size: 32vw; font-weight: 900;
            color: rgba(138, 43, 226, 0.02); z-index: -1; pointer-events: none; font-family: 'Impact', sans-serif;
        }
        .premium-box {
            background: rgba(20, 11, 38, 0.6); backdrop-filter: blur(12px);
            border: 1px solid rgba(138, 43, 226, 0.18); border-radius: 16px;
            padding: 40px; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .hero-title {
            font-size: 2.5rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, var(--accent-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .tabs { display: flex; margin: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; font-weight: 600; }
        .tab-btn.active { color: var(--accent-glow); border-bottom: 2px solid var(--accent-purple); }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; color: var(--text-muted); }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(138, 43, 226, 0.25); border-radius: 6px; color: white; }
        input:focus { outline: none; border-color: var(--accent-glow); }
        .btn-enter { width: 100%; padding: 14px; background: linear-gradient(90deg, var(--accent-purple), #5b13b3); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4); }
        .alert { padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem; display: none; }
        .alert-error { background: rgba(255,75,75,0.15); border: 1px solid #ff4b4b; color: #ff7575; }
        .alert-success { background: rgba(46,204,113,0.15); border: 1px solid #2ecc71; color: #2ecc71; }
    </style>
</head>
<body>
    <div class="premium-box">
        <h1 class="hero-title">NAMO MUSIC</h1>
        <p style="color: var(--text-muted);">Cybernetic Sound Matrix Node System</p>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login Link</button>
            <button class="tab-btn" onclick="switchTab('signup')">New Node</button>
        </div>

        <div id="errorBox" class="alert alert-error"></div>
        <div id="successBox" class="alert alert-success"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group"><label>Username</label><input type="text" id="loginUser" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="loginPass" required></div>
            <button type="submit" class="btn-enter">Authorize Node Entry</button>
        </form>

        <form id="signupForm" onsubmit="handleSignup(event)" style="display: none;">
            <div class="form-group"><label>Username</label><input type="text" id="signupUser" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="signupEmail" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="signupPass" required></div>
            <button type="submit" class="btn-enter">Register Core Node</button>
        </form>
    </div>

    <script>
        function switchTab(t) {
            document.querySelectorAll('.tab-btn')[0].classList.toggle('active', t === 'login');
            document.querySelectorAll('.tab-btn')[1].classList.toggle('active', t === 'signup');
            document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = t === 'signup' ? 'block' : 'none';
        }
        function getUsers() { return JSON.parse(localStorage.getItem('phonkUsers')) || []; }
        function handleSignup(e) {
            e.preventDefault();
            const u = document.getElementById('signupUser').value.trim().toLowerCase();
            let users = getUsers();
            if(users.some(x => x.username === u)) { alert('Username registered!'); return; }
            users.push({ username: u, email: document.getElementById('signupEmail').value, password: document.getElementById('signupPass').value, tracks: [] });
            localStorage.setItem('phonkUsers', JSON.stringify(users));
            document.getElementById('successBox').style.display = 'block';
            document.getElementById('successBox').textContent = "Account Created Node Active!";
            setTimeout(() => { switchTab('login'); }, 1000);
        }
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('loginUser').value.trim().toLowerCase();
            const p = document.getElementById('loginPass').value;
            let user = getUsers().find(x => x.username === u && x.password === p);
            if(!user) { alert('Invalid Configuration Matrix!'); return; }
            localStorage.setItem('phonkCurrentUser', JSON.stringify(user));
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
