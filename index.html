<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAMO MUSIC - AI Music Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            background: #06060c;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(0, 242, 254, 0.12) 0%, transparent 50%),
                              radial-gradient(ellipse at 80% 20%, rgba(79, 172, 254, 0.1) 0%, transparent 50%);
        }

        .container {
            text-align: center;
            max-width: 480px;
            width: 90%;
            padding: 30px 20px;
        }

        /* === GRADIENT LOGO STYLING === */
        .logo h1 {
            font-family: 'Orbitron', 'Impact', sans-serif;
            font-size: 3.2rem;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .glow {
            animation: glow-pulse 3s infinite alternate;
        }

        @keyframes glow-pulse {
            0% { filter: drop-shadow(0 0 5px rgba(0, 242, 254, 0.4)); }
            100% { filter: drop-shadow(0 0 25px rgba(79, 172, 254, 0.8)); }
        }

        .tagline {
            color: #6c7a89;
            font-size: 1rem;
            margin-bottom: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .auth-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 24px;
            padding: 30px 25px;
            backdrop-filter: blur(14px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            gap: 10px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #888;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #000;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            font-weight: 800;
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 14px;
        }

        .auth-form.active {
            display: flex;
        }

        .auth-form input {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #00f2fe;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .auth-form input::placeholder {
            color: #444;
        }

        .btn-primary {
            padding: 14px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.5);
        }

        .features {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #aaa;
            font-size: 0.95rem;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            text-align: left;
        }

        .feature-icon {
            font-size: 1.3rem;
            min-width: 25px;
            text-align: center;
        }

        .error {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid #ff3333;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            color: #ff6666;
            font-size: 0.9rem;
            text-align: left;
        }

        .success-msg {
            background: rgba(51, 255, 119, 0.1);
            border: 1px solid #33ff77;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            color: #66ff99;
            font-size: 0.9rem;
            text-align: left;
        }

        footer {
            margin-top: 40px;
            color: #444;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 20px;
        }

        .brand {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* Responsive Fixes */
        @media (max-width: 400px) {
            .logo h1 {
                font-size: 2.4rem;
            }
            .auth-box {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1 class="glow">NAMO MUSIC</h1>
            <p class="tagline"> AI Music Generator </p>
        </div>

        <div class="auth-box">
            <div id="errorBox" class="error" style="display:none;"></div>
            <div id="successBox" class="success-msg" style="display:none;"></div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                <input type="text" id="loginUser" placeholder="Username" required>
                <input type="password" id="loginPass" placeholder="Password" required>
                <button type="submit" class="btn-primary"> Enter Studio</button>
            </form>

            <form id="signup-form" class="auth-form" onsubmit="handleSignup(event)">
                <input type="text" id="signupUser" placeholder="Choose Username" required minlength="3">
                <input type="email" id="signupEmail" placeholder="Email Address" required>
                <input type="password" id="signupPass" placeholder="Password (min 6 chars)" required minlength="6">
                <button type="submit" class="btn-primary"> Create Account</button>
            </form>

            <div class="features">
                <div class="feature">
                    <span class="feature-icon"></span>
                    <span>Phonk • Trap • Lo-fi • Drift Phonk</span>
                </div>
                <div class="feature">
                    <span class="feature-icon"></span>
                    <span>Powered by Udio + Suno AI + MusicGen</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">©</span>
                    <span>Copyright Reserved — Full Ownership of Tracks</span>
                </div>
                <div class="feature">
                    <span class="feature-icon"></span>
                    <span>Secure Local Storage Authentication</span>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 <span class="brand">NAMO MUSIC</span> — All Rights Reserved</p>
            <p style="font-size:0.75rem; margin-top:5px; color:#555;">Made with  for khatarnak beats</p>
        </footer>
    </div>

    <script>
        // ===================== TAB SWITCHING =====================
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('successBox').style.display = 'none';

            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            }
        }

        // ===================== USER DATABASE (LocalStorage) =====================
        function getUsers() {
            let users = localStorage.getItem('phonkUsers');
            return users ? JSON.parse(users) : [];
        }

        function saveUsers(users) {
            localStorage.setItem('phonkUsers', JSON.stringify(users));
        }

        function getCurrentUser() {
            return localStorage.getItem('phonkCurrentUser');
        }

        // ===================== SIGNUP =====================
        function handleSignup(e) {
            e.preventDefault();
            const username = document.getElementById('signupUser').value.trim().toLowerCase();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPass').value;
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');

            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            let users = getUsers();

            // Check username
            if (users.find(u => u.username === username)) {
                errorBox.textContent = ' Username already exists!';
                errorBox.style.display = 'block';
                return;
            }

            // Check email
            if (users.find(u => u.email === email)) {
                errorBox.textContent = ' Email already registered!';
                errorBox.style.display = 'block';
                return;
            }

            // Save user
            users.push({
                username: username,
                email: email,
                password: password,
                created: new Date().toISOString(),
                tracks: []
            });
            saveUsers(users);

            successBox.textContent = ' Account created successfully! Switching to Login...';
            successBox.style.display = 'block';

            // Clear form
            document.getElementById('signupUser').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPass').value = '';

            // Switch to login tab after 1 sec
            setTimeout(() => switchTab('login'), 1200);
        }

        // ===================== LOGIN =====================
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUser').value.trim().toLowerCase();
            const password = document.getElementById('loginPass').value;
            const errorBox = document.getElementById('errorBox');

            errorBox.style.display = 'none';

            let users = getUsers();
            const user = users.find(u => u.username === username && u.password === password);

            if (!user) {
                errorBox.textContent = ' Invalid username or password!';
                errorBox.style.display = 'block';
                return;
            }

            // Set current user
            localStorage.setItem('phonkCurrentUser', JSON.stringify(user));

            // Redirect to dashboard page
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
