<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM Studio - AI Core Generator</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-main: #070312;
            --accent-purple: #8a2be2;
            --accent-glow: #bf55ec;
            --text-main: #f5f6fa;
            --text-muted: #9a90b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, var(--bg-main) 0%, #11052c 60%, #1d093a 100%);
            color: var(--text-main); min-height: 100vh; position: relative;
        }
        body::before {
            content: "NM"; position: fixed; bottom: -30px; right: -10px; font-size: 32vw; font-weight: 900;
            color: rgba(138, 43, 226, 0.02); z-index: -1; pointer-events: none; font-family: 'Impact', sans-serif;
        }
        .navbar {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 40px;
            background: rgba(7, 3, 18, 0.8); border-bottom: 1px solid rgba(138, 43, 226, 0.2);
        }
        .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 25px; font-weight: 600; }
        .workspace { max-width: 900px; margin: 40px auto; padding: 30px; background: rgba(20, 11, 38, 0.6); border-radius: 16px; border: 1px solid rgba(138, 43, 226, 0.2); }
        .control-panel { background: rgba(0,0,0,0.3); padding: 25px; border-radius: 12px; margin-top: 20px; border: 1px dashed rgba(138,43,226,0.3); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--accent-glow); font-size: 0.9rem; text-transform: uppercase; }
        textarea, input[type="text"] { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(138,43,226,0.3); border-radius: 8px; color: white; }
        .btn-trigger { width: 100%; padding: 16px; background: linear-gradient(90deg, #ff79c6, var(--accent-purple)); border: none; border-radius: 8px; color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .style-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .style-btn { padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(138,43,226,0.2); color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .style-btn.active { background: var(--accent-purple); border-color: var(--accent-glow); }
        .video-box { width: 100%; position: relative; margin-top: 20px; border-radius: 12px; overflow: hidden; display: none; border: 1px solid var(--accent-glow); }
        video { width: 100%; display: block; }
        .subtitles-layer { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; text-align: center; color: white; font-size: 1.8rem; font-weight: 900; text-shadow: 0 4px 12px #000; font-family: 'Impact', sans-serif; pointer-events: none; letter-spacing: 1px; text-transform: uppercase; }
        .status { padding: 15px; text-align: center; font-weight: bold; background: rgba(255,255,255,0.05); border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h2 style="color: #ff79c6; font-weight:800;">NM STUDIO</h2>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="generate.html" style="color: var(--accent-glow);">AI Workshop</a>
            <a href="library.html">Vault Nodes</a>
        </div>
    </nav>

    <div class="workspace">
        <h2 style="color: #fff;"> Neural Synthesis Terminal</h2>
        <p style="color: var(--text-muted); margin-bottom: 25px;">Udio Music Generation & Automated Pexels Cinematic Pipeline</p>

        <div class="form-group">
            <label>Select Aesthetic Element Structure</label>
            <div class="style-grid" id="styleGrid">
                <button class="style-btn active" data-style="phonk">PHONK </button>
                <button class="style-btn" data-style="trap">TRAP</button>
                <button class="style-btn" data-style="lo-fi">LO-FI</button>
                <button class="style-btn" data-style="drift">DRIFT PHONK</button>
            </div>
        </div>

        <div class="form-group">
            <label>Acoustic Audio Prompt Descriptor</label>
            <textarea id="audioPrompt" rows="3" placeholder="Describe the atmosphere... (e.g., Aggressive high-intensity phonk with deep distortion base loops)"></textarea>
        </div>

        <div class="control-panel">
            <h3 style="color: var(--accent-glow); margin-bottom: 15px;"> Visual Synthesizer Config</h3>
            <div class="form-group">
                <label>Cinematic Video Reference Stream Prompt</label>
                <input type="text" id="videoPrompt" placeholder="e.g., Tokyo street race night drift loop, purple glowing ambiance">
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="lyricsToggle" checked style="cursor: pointer;">
                <label for="lyricsToggle" style="margin-bottom:0; text-transform:none;">Render Synchronized Dynamic Lyrics Subtitles onto final video</label>
            </div>
        </div>

        <button class="btn-trigger" id="masterTrigger" onclick="startMatrixPipeline()" style="margin-top: 25px;"> TRIGGER MATRIX PIPELINE</button>

        <div id="loader" class="status" style="display: none; color: var(--accent-glow);"> PROCESSING NEURAL ARCHITECTURE SIGNAL MAPS... PLEASE STAND BY.</div>
        
        <div id="matrixOutput" style="display: none; margin-top:25px;">
            <h3 style="color:#4ade80; margin-bottom:15px;"> Neural Sequence Synthesis Terminated Successfully</h3>
            <audio id="audioSource" controls style="width: 100%; margin-bottom: 20px;"></audio>
            
            <div class="video-box" id="vFrame">
                <video id="vPlayer" loop muted playsinline></video>
                <div class="subtitles-layer" id="lyricsLayer"></div>
            </div>

            <button class="btn-trigger" style="background:var(--accent-purple); margin-top:20px;" onclick="commitToVault()"> COMMIT TO SECURED VAULT NODE</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBKnHWUPiNMzvVTYmVMrB9Zs9iliCyr-rY",
            authDomain: "namo-music-479ce.firebaseapp.com",
            databaseURL: "https://namo-music-479ce-default-rtdb.firebaseio.com",
            projectId: "namo-music-479ce",
            storageBucket: "namo-music-479ce.firebasestorage.app",
            messagingSenderId: "405808324789",
            appId: "1:405808324789:web:4e857029243c84902b5efc",
            measurementId: "G-4GTSW2PRPJ"
        };
        firebase.initializeApp(firebaseConfig);

        const PEXELS_KEY = "5307c1e0854f00000100000305f88572b9a147e8b61c9ecba5a31e13";
        let activeStyle = 'phonk';
        let operationResult = null;

        const uStr = localStorage.getItem('phonkCurrentUser');
        if(!uStr) window.location.href = 'index.html';
        const user = JSON.parse(uStr);

        document.getElementById('styleGrid').addEventListener('click', (e) => {
            if(e.target.classList.contains('style-btn')) {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                activeStyle = e.target.getAttribute('data-style');
            }
        });

        async function startMatrixPipeline() {
            const prompt = document.getElementById('audioPrompt').value.trim();
            if(!prompt) { alert('Prompt input matrix blank!'); return; }

            document.getElementById('loader').style.display = 'block';
            document.getElementById('matrixOutput').style.display = 'none';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, style: activeStyle })
                });
                const data = await response.json();

                if(data.success || data.audio_url) {
                    operationResult = {
                        title: prompt.substring(0, 30) + '...',
                        style: activeStyle,
                        prompt: prompt,
                        audioUrl: data.audio_url,
                        created: Date.now()
                    };

                    document.getElementById('audioSource').src = data.audio_url;
                    document.getElementById('matrixOutput').style.display = 'block';
                    document.getElementById('audioSource').play();

                    await syncVisualStream();
                } else { alert('Pipeline configuration break.'); }
            } catch(e) { alert('Core error: ' + e.message); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        async function syncVisualStream() {
            const query = document.getElementById('videoPrompt').value.trim() || `${activeStyle} dark neon car`;
            try {
                const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=1`, {
                    headers: { 'Authorization': PEXELS_KEY }
                });
                const vData = await res.json();
                if(vData.videos && vData.videos.length > 0) {
                    const srcLink = vData.videos[0].video_files.find(f => f.quality === 'hd' || f.quality === 'sd').link;
                    const vp = document.getElementById('vPlayer');
                    vp.src = srcLink;
                    document.getElementById('vFrame').style.display = 'block';
                    vp.play();

                    if(document.getElementById('lyricsToggle').checked) {
                        triggerSubtitleEngine();
                    }
                }
            } catch(err) { console.log('Visual layer mismatch loop skipped.'); }
        }

        function triggerSubtitleEngine() {
            const scripts = [" NAMO MUSIC CORE TRIGGERED ", " DISTORTED GRADIENT BASS ONLINE ", " DRIFT SIGNAL GENERATION SYNCED "];
            const layer = document.getElementById('lyricsLayer');
            let idx = 0; layer.textContent = scripts[0];
            setInterval(() => {
                idx = (idx + 1) % scripts.length;
                layer.textContent = scripts[idx];
            }, 3500);
        }

        function commitToVault() {
            if(!operationResult) return;
            if(!user.tracks) user.tracks = [];
            user.tracks.push(operationResult);
            
            localStorage.setItem('phonkCurrentUser', JSON.stringify(user));
            firebase.database().ref('vault_users/' + user.username).set(user);
            alert(' Track Logged and Synced into Cloud Architecture Node Repository!');
            window.location.href = 'library.html';
        }
    </script>
</body>
</html>
