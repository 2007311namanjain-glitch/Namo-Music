<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM Studio - Audio Lab Core</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --mesh-gradient: linear-gradient(135deg, #030107 0%, #0f0426 40%, #26073d 100%);
            --neon-cyan: #00f2fe;
            --neon-magenta: #e040fb;
            --glass-box: rgba(12, 6, 28, 0.75);
            --text-main: #f5f6fa;
            --text-muted: #a29bfe;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--mesh-gradient); color: var(--text-main); min-height: 100vh; position: relative; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(3, 1, 7, 0.9); border-bottom: 1px solid rgba(226, 64, 251, 0.2); }
        .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 25px; font-weight: 600; }
        .lab-workspace { max-width: 900px; margin: 40px auto; padding: 30px; background: var(--glass-box); border-radius: 20px; border: 1px solid rgba(224, 64, 251, 0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        h2 { font-weight: 800; letter-spacing: 1px; margin-bottom: 25px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; text-transform: uppercase; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; }
        input[type="text"], select, textarea { width: 100%; padding: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(224,64,251,0.25); border-radius: 10px; color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: var(--neon-magenta); box-shadow: 0 0 12px rgba(224,64,251,0.4); }
        .btn-pulse { padding: 16px 35px; background: linear-gradient(90deg, #e040fb, #7b1fa2); border: none; color: white; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 20px rgba(224,64,251,0.4); font-size: 1.05rem; width: 100%; transition: 0.3s; }
        .btn-pulse:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(224,64,251,0.7); }
        .style-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .style-chip { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: 0.2s; }
        .style-chip.active { background: rgba(224,64,251,0.2); border-color: var(--neon-magenta); color: #fff; text-shadow: 0 0 5px var(--neon-magenta); }
        .remix-panel { border-left: 3px dashed var(--neon-magenta); padding-left: 20px; background: rgba(224,64,251,0.02); padding: 20px; border-radius: 0 12px 12px 0; margin-top: 15px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h2 style="color: #e040fb; font-weight: 800;">NM LAB </h2>
        <div class="nav-links"><a href="dashboard.html">Dashboard</a><a href="generate.html" style="color: var(--neon-magenta)">Audio Lab</a><a href="video.html">Visual Compiler</a><a href="library.html">Vault Nodes</a></div>
    </nav>

    <div class="lab-workspace">
        <h2 style="color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;"> MULTI-MATRIX AUDIO CORE DESK</h2>
        
        <div class="form-group">
            <label>1. Define Structural Track Prompt</label>
            <input type="text" id="audioPrompt" placeholder="Describe the sonic parameters (e.g. Aggressive drift bass, fast hard-hitting hi-hats, ultra distorted melody)...">
        </div>

        <div class="form-group">
            <label>2. Core Style Preset Engine Matrix</label>
            <div class="style-grid" id="stylePresets">
                <div class="style-chip active" onclick="selectStyle('phonk')">Drift Phonk</div>
                <div class="style-chip" onclick="selectStyle('hardstyle')">Hardstyle</div>
                <div class="style-chip" onclick="selectStyle('cyberpunk')">Cyber-Synth</div>
                <div class="style-chip" onclick="selectStyle('lofi')">Chill Lofi</div>
                <div class="style-chip" onclick="selectStyle('hiphop')">BoomBap Rap</div>
                <div class="style-chip" onclick="selectStyle('edm')">Trap Pulse</div>
                <div class="style-chip" onclick="selectStyle('ai-guided')"> AI Decides</div>
                <div class="style-chip" onclick="selectStyle('custom')"> Self Script</div>
            </div>
            <input type="text" id="customStyle" placeholder="Type custom style array mechanics..." style="display: none; margin-top: 10px;">
        </div>

        <div class="form-group">
            <label>3. Vocal & Lyrics Architecture Engine</label>
            <select id="lyricsMode" onchange="toggleLyricsInput()">
                <option value="auto">Auto Synthesized Intelligent AI Vocals</option>
                <option value="custom">Self-Writing Sandbox Lyrics Panel</option>
                <option value="instrumental">Pure Instrumental - Raw Digital Waveforms</option>
            </select>
            <textarea id="customLyricsText" rows="4" placeholder="Paste or type your customized vocal verses here..." style="display: none; margin-top:12px; resize: none;"></textarea>
        </div>

        <div class="form-group">
            <div style="display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="stitchingToggle" onchange="toggleRemixPanel()" style="width:18px; height:18px; cursor:pointer;">
                <label for="stitchingToggle" style="margin-bottom:0; cursor:pointer;">Activate Laboratory Multi-Song Remix Stitcher Loop</label>
            </div>
            
            <div class="remix-panel" id="remixPanel" style="display:none;">
                <label>Secondary Layer/Song Node Integration Input</label>
                <input type="text" id="secondaryTrackInput" placeholder="Enter secondary target song URL or theme signature prompt..." style="margin-bottom:12px;">
                
                <label>Remix Cross-Fade Intensity Blend</label>
                <select id="remixIntensity">
                    <option value="low">Subtle Harmonic Undertone Fusion (10%)</option>
                    <option value="medium" selected>Balanced Matrix Mashup Equalizer (50%)</option>
                    <option value="high">Total Chaotic Reconstruction Metamorphosis (100%)</option>
                </select>
            </div>
        </div>

        <button class="btn-pulse" id="genAudioBtn" onclick="runAudioGenerationSequence()"> INJECT CORE MIX SPECIFICATION</button>

        <div id="loadingPulse" style="display: none; margin-top: 20px; text-align: center; color: var(--neon-cyan); font-weight: bold;">
             Compiling audio matrix configurations... Please wait.
        </div>

        <div id="audioOutputBox" style="display: none; margin-top: 30px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; border: 1px solid rgba(224,64,251,0.2);">
            <h4 style="color: var(--neon-cyan); margin-bottom: 10px;">Output Node Generation Complete</h4>
            <audio id="audioPlaybackNode" controls></audio>
            <button class="btn-pulse" style="margin-top: 15px; background: #00e5ff; color: black;" onclick="commitAudioToCache()"> SAVE COMPILATION TO LOCAL STORAGE DATABASE</button>
        </div>
    </div>

    <script>
        // Firebase initialization variables
        const firebaseConfig = {
            apiKey: "AIzaSyBKnHWUPiNMzvVTYmVMrB9Zs9iliCyr-rY",
            authDomain: "namo-music-479ce.firebaseapp.com",
            databaseURL: "https://namo-music-479ce-default-rtdb.firebaseio.com",
            projectId: "namo-music-479ce",
            storageBucket: "namo-music-479ce.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);

        const user = JSON.parse(localStorage.getItem('phonkCurrentUser'));
        let selectedPresetStyle = 'phonk';
        let freshlyGeneratedTrack = null;

        function selectStyle(st) {
            selectedPresetStyle = st;
            document.querySelectorAll('.style-chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('customStyle').style.display = st === 'custom' ? 'block' : 'none';
        }

        function toggleLyricsInput() {
            const m = document.getElementById('lyricsMode').value;
            document.getElementById('customLyricsText').style.display = m === 'custom' ? 'block' : 'none';
        }

        function toggleRemixPanel() {
            document.getElementById('remixPanel').style.display = document.getElementById('stitchingToggle').checked ? 'block' : 'none';
        }

        async function runAudioGenerationSequence() {
            const prompt = document.getElementById('audioPrompt').value.trim();
            if(!prompt) { alert('Prompt is empty inside the configuration deck!'); return; }

            document.getElementById('loadingPulse').style.display = 'block';
            document.getElementById('audioOutputBox').style.display = 'none';
            document.getElementById('genAudioBtn').disabled = true;

            try {
                const res = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        style: selectedPresetStyle === 'ai-guided' ? 'AI Optimized Beat' : selectedPresetStyle,
                        custom_style: document.getElementById('customStyle').value,
                        lyrics_mode: document.getElementById('lyricsMode').value,
                        custom_lyrics: document.getElementById('customLyricsText').value,
                        stitching_enabled: document.getElementById('stitchingToggle').checked,
                        secondary_track: document.getElementById('secondaryTrackInput').value,
                        remix_intensity: document.getElementById('remixIntensity').value
                    })
                });
                const data = await res.json();
                
                freshlyGeneratedTrack = {
                    title: data.title || prompt.substring(0, 25) + '... (Mix Node)',
                    style: data.style || selectedPresetStyle,
                    prompt: prompt,
                    audioUrl: data.audio_url || "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                    created: Date.now()
                };

                document.getElementById('audioPlaybackNode').src = freshlyGeneratedTrack.audioUrl;
                document.getElementById('audioOutputBox').style.display = 'block';
            } catch(e) {
                alert('Lab Matrix Pipeline Communication error: ' + e.message);
            } finally {
                document.getElementById('loadingPulse').style.display = 'none';
                document.getElementById('genAudioBtn').disabled = false;
            }
        }

        function commitAudioToCache() {
            if(!freshlyGeneratedTrack) return;
            if(!user.tracks) user.tracks = [];
            user.tracks.push(freshlyGeneratedTrack);
            localStorage.setItem('phonkCurrentUser', JSON.stringify(user));
            firebase.database().ref('vault_users/' + user.username).set(user);
            alert(' Track successfully injected into Database Vault Node Registry!');
            window.location.href = 'video.html';
        }
    </script>
</body>
</html>
