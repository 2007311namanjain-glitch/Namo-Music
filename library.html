<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM Studio - Secure Vault Nodes</title>
    <style>
        :root {
            --bg-main: #070312;
            --accent-purple: #8a2be2;
            --accent-glow: #bf55ec;
            --text-main: #f5f6fa;
            --text-muted: #9a90b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, var(--bg-main) 0%, #11052c 60%, #1d093a 100%); color: var(--text-main); min-height: 100vh; position: relative; }
        body::before {
            content: "NM"; position: fixed; bottom: -30px; right: -10px; font-size: 32vw; font-weight: 900;
            color: rgba(138, 43, 226, 0.02); z-index: -1; pointer-events: none; font-family: 'Impact', sans-serif;
        }
        .navbar {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 40px;
            background: rgba(7, 3, 18, 0.8); border-bottom: 1px solid rgba(138, 43, 226, 0.2);
        }
        .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 25px; font-weight: 600; }
        .vault-container { max-width: 1100px; margin: 40px auto; padding: 30px; background: rgba(20, 11, 38, 0.6); border-radius: 16px; border: 1px solid rgba(138, 43, 226, 0.2); }
        .grid-system { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 25px; }
        .node-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(138, 43, 226, 0.15); border-radius: 12px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; }
        .card-meta { display: flex; gap: 10px; margin: 10px 0; }
        .tag { padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .tag-style { background: rgba(138, 43, 226, 0.3); color: #ff79c6; }
        .tag-device { background: rgba(191, 85, 236, 0.2); color: #00f2fe; }
        audio { width: 100%; margin-top: 15px; }
        .card-footer { display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <nav class="navbar">
        <h2 style="color: #ff79c6; font-weight:800;">NM STUDIO</h2>
        <div class="nav-links"><a href="dashboard.html">Dashboard</a><a href="generate.html">AI Workshop</a><a href="library.html" style="color: var(--accent-glow);">Vault Nodes</a></div>
    </nav>

    <div class="vault-container">
        <h2 style="color: var(--accent-glow);"> SECURED CLOUD VAULT STORAGE</h2>
        <p style="color: var(--text-muted);">Dynamic Synchronization Node Verification Logs</p>
        
        <div id="vaultGrid"></div>
    </div>

    <script>
        const uStr = localStorage.getItem('phonkCurrentUser');
        if(!uStr) window.location.href = 'index.html';
        const user = JSON.parse(uStr);
        const container = document.getElementById('vaultGrid');

        const tracks = user.tracks || [];
        if(tracks.length === 0) {
            container.innerHTML = `<p style="text-align:center; padding:40px; color:var(--text-muted);">No commit nodes initialized inside your cloud framework database.</p>`;
        } else {
            let html = '<div class="grid-system">';
            tracks.forEach(t => {
                html += `
                    <div class="node-card">
                        <div>
                            <h3 style="color:#fff;">${t.title}</h3>
                            <div class="card-meta">
                                <span class="tag tag-style">${t.style}</span>
                                <span class="tag tag-device">Live Vault Sync</span>
                            </div>
                            <p style="font-size:0.85rem; color:var(--text-muted); line-height:1.4;">${t.prompt}</p>
                        </div>
                        <audio controls src="${t.audioUrl}"></audio>
                        <div class="card-footer">
                            <span>${new Date(t.created).toLocaleDateString('en-IN')}</span>
                            <span style="color:#ff79c6; font-weight:bold;">© NM Reserved</span>
                        </div>
                    </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
