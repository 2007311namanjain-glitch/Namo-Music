<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM Studio - Secure Vault Nodes</title>
    <style>
        :root {
            --bg-main: #04010a;
            --accent-purple: #7b1fa2;
            --accent-glow: #e040fb;
            --text-main: #f5f6fa;
            --text-muted: #a29bfe;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, var(--bg-main) 0%, #0d041a 60%, #1a0833 100%); color: var(--text-main); min-height: 100vh; position: relative; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(4, 1, 10, 0.9); border-bottom: 1px solid rgba(224, 64, 251, 0.2); }
        .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 25px; font-weight: 600; }
        .vault-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grid-system { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .node-card { background: rgba(20, 11, 38, 0.6); border: 1px solid rgba(224,64,251,0.15); border-radius: 16px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; min-height: 220px; transition: 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .node-card:hover { border-color: var(--accent-glow); transform: translateY(-3px); box-shadow: 0 8px 30px rgba(123,31,162,0.4); }
        .card-meta { display: flex; gap: 8px; margin: 12px 0; }
        .tag { font-size: 0.75rem; padding: 4px 10px; border-radius: 30px; font-weight: bold; text-transform: uppercase; }
        .tag-style { background: rgba(224,64,251,0.15); color: var(--accent-glow); border: 1px solid rgba(224,64,251,0.3); }
        .tag-device { background: rgba(0, 229, 255, 0.15); color: #00e5ff; border: 1px solid rgba(0, 229, 255, 0.3); }
        audio { width: 100%; margin-top: 15px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <nav class="navbar">
        <h2 style="color: #e040fb; font-weight:800;">NM VAULT </h2>
        <div class="nav-links"><a href="dashboard.html">Dashboard</a><a href="generate.html">Audio Lab</a><a href="video.html">Visual Compiler</a><a href="library.html" style="color: var(--accent-glow)">Vault Nodes</a></div>
    </nav>

    <div class="vault-container">
        <h2 style="margin-bottom: 35px; color: #fff; font-weight: 800; letter-spacing: 1px;"> SECURED ENCRYPTED CLOUD VAULT NODES</h2>
        <div id="vaultGrid"></div>
    </div>

    <script>
        const uStr = localStorage.getItem('phonkCurrentUser');
        const user = JSON.parse(uStr);
        const container = document.getElementById('vaultGrid');
        const tracks = user.tracks || [];

        if(tracks.length === 0) {
            container.innerHTML = `<p style="text-align:center; padding:40px; color:var(--text-muted); font-style:italic;">No commit nodes initialized inside your cloud framework database serverless logs.</p>`;
        } else {
            let html = '<div class="grid-system">';
            tracks.forEach(t => {
                html += `
                    <div class="node-card">
                        <div>
                            <h3 style="color:#fff; font-size:1.25rem; font-weight:700;"> ${t.title}</h3>
                            <div class="card-meta">
                                <span class="tag tag-style">${t.style}</span>
                                <span class="tag tag-device">Live Vault Sync</span>
                            </div>
                            <p style="font-size:0.85rem; color:var(--text-muted); line-height:1.4; font-style:italic;">"${t.prompt}"</p>
                        </div>
                        <audio controls src="${t.audioUrl}"></audio>
                        <div class="card-footer">
                            <span>Deployed: ${new Date(t.created).toLocaleDateString('en-IN')}</span>
                            <span style="color:#e040fb; font-weight:bold; letter-spacing:1px;">© NM RESERVED</span>
                        </div>
                    </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
