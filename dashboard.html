<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM Studio - Control Dashboard</title>
    <style>
        :root {
            --bg-main: #070312;
            --accent-purple: #8a2be2;
            --accent-glow: #bf55ec;
            --text-main: #f5f6fa;
            --text-muted: #9a90b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, var(--bg-main) 0%, #11052c 60%, #1d093a 100%);
            color: var(--text-main); min-height: 100vh; position: relative; padding-bottom: 40px;
        }
        body::before {
            content: "NM"; position: fixed; bottom: -30px; right: -10px; font-size: 32vw; font-weight: 900;
            color: rgba(138, 43, 226, 0.02); z-index: -1; pointer-events: none; font-family: 'Impact', sans-serif;
        }
        .navbar {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 40px;
            background: rgba(7, 3, 18, 0.8); border-bottom: 1px solid rgba(138, 43, 226, 0.2);
        }
        .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 25px; font-weight: 600; }
        .grid-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .premium-card {
            background: rgba(20, 11, 38, 0.6); backdrop-filter: blur(12px);
            border: 1px solid rgba(138, 43, 226, 0.18); border-radius: 16px; padding: 35px;
        }
        .pulse-text { background: linear-gradient(90deg, var(--accent-purple), #ff79c6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .track-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 25px; }
        .track-node { background: rgba(0,0,0,0.4); border: 1px solid rgba(138, 43, 226, 0.15); border-radius: 8px; padding: 20px; }
        audio { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h2 class="pulse-text" style="font-weight:800; letter-spacing:1px;">NM STUDIO</h2>
        <div class="nav-links">
            <a href="dashboard.html" style="color: var(--accent-glow);">Dashboard</a>
            <a href="generate.html">AI Workshop</a>
            <a href="library.html">Vault Nodes</a>
            <a onclick="localStorage.removeItem('phonkCurrentUser'); window.location.href='index.html';" style="cursor:pointer; margin-left:20px; color:#ff4b4b;">Logout</a>
        </div>
    </nav>

    <div class="grid-container">
        <div class="premium-card">
            <h3>User Node Protocol: <span id="userDisplay" style="color: var(--accent-glow);">...</span></h3>
            <p style="color: #4ade80; margin-top: 10px; font-weight: bold;">System State: Operational Layer Verified ✓</p>
        </div>

        <h3 style="margin-top: 40px; border-left: 4px solid var(--accent-purple); padding-left: 15px;">Recent Cache Generation Pulses</h3>
        <div id="recentGrid"></div>
    </div>

    <script>
        const uStr = localStorage.getItem('phonkCurrentUser');
        if(!uStr) window.location.href = 'index.html';
        const user = JSON.parse(uStr);
        document.getElementById('userDisplay').textContent = user.username.toUpperCase();

        const tracks = user.tracks || [];
        const container = document.getElementById('recentGrid');
        if(tracks.length === 0) {
            container.innerHTML = `<p style='margin-top:20px; color:var(--text-muted);'>No compilation logs recorded. Go to AI Workshop to run generation sequence.</p>`;
        } else {
            let html = '<div class="track-grid">';
            tracks.slice(-6).reverse().forEach(t => {
                html += `
                    <div class="track-node">
                        <h4 style="color:var(--accent-glow);">${t.title}</h4>
                        <p style="font-size:0.8rem; color:var(--text-muted); margin-top:5px;">Style: ${t.style} | API Matrix Client</p>
                        <audio controls src="${t.audioUrl}"></audio>
                    </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
