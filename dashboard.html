<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namo Music Lab – Dashboard</title>
    <style>
        :root {
            --bg-main: #04010a;
            --accent-purple: #7b1fa2;
            --accent-glow: #e040fb;
            --accent-blue: #00e5ff;
            --text-main: #f5f6fa;
            --text-muted: #a29bfe;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background: radial-gradient(circle at 50% 20%, #140930, var(--bg-main) 70%); color: var(--text-main); min-height:100vh; }
        
        .navbar { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:rgba(4,1,10,0.85); border-bottom:1px solid rgba(224,64,251,0.2); position:relative; }
        
        .brand-logo-nav { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo-box-nav { background: linear-gradient(135deg, var(--accent-glow), var(--accent-blue)); padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 1.3rem; color: #000; }
        .logo-title-nav { font-size: 1.4rem; font-weight: 800; color: #fff; letter-spacing: 0.5px; }

        .nav-links { display:flex; align-items:center; gap:20px; }
        .nav-links a { color:var(--text-muted); text-decoration:none; font-weight:600; transition:0.3s; }
        .nav-links a:hover, .nav-links a.active { color:var(--accent-glow); }
        
        /* Fixed & Glowing Hamburger */
        .hamburger { display:none; font-size:2rem; cursor:pointer; color:var(--accent-glow); background:none; border:none; outline:none; font-weight:bold; }
        
        .container { max-width:1200px; margin:40px auto; padding:0 20px; }
        .welcome-card { background:rgba(20,11,38,0.5); backdrop-filter:blur(12px); border:1px solid rgba(224,64,251,0.15); border-radius:16px; padding:35px; position:relative; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .welcome-card .badge { position:absolute; top:20px; right:20px; background:linear-gradient(45deg, #ffd700, #ff8c00); color:#000; padding:4px 12px; border-radius:30px; font-weight:bold; font-size:0.75rem; }
        
        .greeting { font-size:2.2rem; font-weight:800; }
        .greeting span { background:linear-gradient(90deg, var(--accent-glow), var(--accent-blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .status { color:#4ade80; margin-top:12px; font-weight:600; font-size:0.95rem; display:flex; align-items:center; gap:6px; }
        
        .quick-actions { display:flex; gap:15px; margin:35px 0; flex-wrap:wrap; }
        .quick-actions a { text-decoration:none; }
        .btn-primary { background:linear-gradient(90deg, #7b1fa2, #9c27b0); border:none; padding:14px 28px; border-radius:50px; color:#fff; font-weight:bold; cursor:pointer; transition:0.3s; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 0 20px rgba(224,64,251,0.5); }
        
        .section-title { font-size:1.4rem; font-weight:700; margin:40px 0 20px 0; padding-left:12px; border-left:4px solid var(--accent-glow); }
        .track-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:20px; }
        
        /* Upgraded Testimonial Form Panel */
        .testimonial-panel { background: rgba(20,11,38,0.4); border: 1px solid rgba(0,229,255,0.2); border-radius: 16px; padding: 25px; margin-top: 30px; backdrop-filter: blur(10px); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
        .form-control { width: 100%; padding: 12px; background: #0b0b12; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none; font-size: 1rem; }
        .form-control:focus { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(0,225,255,0.2); }
        textarea.form-control { resize: vertical; min-height: 80px; }
        .btn-submit { background: linear-gradient(90deg, var(--accent-blue), #00b0ff); color: #000; border: none; padding: 12px 24px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 0 15px rgba(0,225,255,0.5); }

        .footer { text-align:center; padding:30px; border-top:1px solid rgba(224,64,251,0.15); color:var(--text-muted); margin-top:60px; font-size:0.9rem; }
        .footer a { color:var(--accent-glow); text-decoration:none; }

        @media (max-width:768px) {
            .nav-links { display:none; flex-direction:column; width:100%; background:rgba(11,6,22,0.95); padding:20px; position:absolute; top:65px; left:0; border-bottom:1px solid rgba(224,64,251,0.2); z-index:999; gap:15px; }
            .nav-links.active { display:flex !important; }
            .hamburger { display:block !important; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="brand-logo-nav">
            <div class="logo-box-nav">NM</div>
            <div class="logo-title-nav">Namo Music Lab</div>
        </a>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <div class="nav-links" id="navLinks">
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="generate.html">Audio Lab</a>
            <a href="video.html">Video Lab</a>
            <a href="library.html">Library</a>
            <a href="index.html" onclick="localStorage.removeItem('phonkCurrentUser')" style="color:#ff5252;">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-card">
            <div class="badge">CREATOR SUITE</div>
            <h1 class="greeting" id="dynamicGreeting">Welcome back!</h1>
            <p class="status">● System Status: Ready to Create</p>
        </div>

        <div class="quick-actions">
            <a href="generate.html"><button class="btn-primary">🎵 Open Audio Lab</button></a>
            <a href="video.html"><button class="btn-primary">🎬 Open Video Lab</button></a>
            <a href="library.html"><button class="btn-primary">📁 View Saved Library</button></a>
        </div>

        <h3 class="section-title">Share Your Experience</h3>
        <div class="testimonial-panel">
            <div class="form-group">
                <label>Write Your Testimonial / Feedback</label>
                <textarea id="testimonialText" class="form-control" placeholder="Bhai, aapko ye platform kaisa laga? Apna experience share karein..."></textarea>
            </div>
            <button class="btn-submit" onclick="submitTestimonial()">Submit Testimonial</button>
        </div>

        <h3 class="section-title">Your Recent Audio Beats</h3>
        <div id="recentGrid">
            <p style="color:var(--text-muted);">No tracks loaded yet. Create or check your library tab!</p>
        </div>
    </div>

    <footer class="footer">
        <p>Support Workspace: <a href="mailto:namo.music.lab@gmail.com">namo.music.lab@gmail.com</a> | © 2026 Namo Music Lab</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://namo-music-lab-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function toggleMenu() { 
            document.getElementById('navLinks').classList.toggle('active'); 
        }

        const uStr = localStorage.getItem('phonkCurrentUser');
        if (!uStr) window.location.href = 'index.html';
        const user = JSON.parse(uStr);

        const hrs = new Date().getHours();
        let localizedGreeting = "Welcome Sa!";
        if (hrs >= 4 && hrs < 12) localizedGreeting = "Ram Ram Sa / Good Morning!";
        else if (hrs >= 12 && hrs < 17) localizedGreeting = "Ram Ram Sa / Good Afternoon!";
        else localizedGreeting = "Good Evening Sa!";
        
        document.getElementById('dynamicGreeting').innerHTML = `${localizedGreeting} <span>${user.username.toUpperCase()}</span>`;

        // Function to process and store testimonial submissions
        function submitTestimonial() {
            const feedbackText = document.getElementById('testimonialText').value.trim();
            if(!feedbackText) {
                alert("Bhai, kuch likho toh sahi feedback box mein!");
                return;
            }
            if(!user || !db) return;

            db.ref(`testimonials`).push({
                username: user.username,
                userId: user.id || 'simulated_user_id',
                feedback: feedbackText,
                timestamp: Date.now()
            }).then(() => {
                alert("Thank you bhai! Aapka testimonial secure submit ho gaya hai.");
                document.getElementById('testimonialText').value = '';
            }).catch((err) => {
                console.error(err);
                alert("Database push failed. Ek baar network verify karein.");
            });
        }
    </script>
</body>
</html>
